name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Lint
        run: ruff check .

      - name: Format
        run: ruff format --check .

      - name: Demo
        run: entropy-loop demo

      - name: Doctor
        run: entropy-loop doctor

      - name: Version import check
        run: python -c "import entropy_loop_core; print(entropy_loop_core.__version__)"

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

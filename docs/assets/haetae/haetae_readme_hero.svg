<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Entropy Loop Core Haetae launch hero</title>
  <desc id="desc">Haetae guardian mascot beside the Entropy Loop Core failure compiler vision and output surfaces.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2b1d2f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="#fbf4e8"/>
  <rect x="24" y="24" width="1152" height="572" rx="34" fill="#fffaf0" stroke="#dfd2bf" stroke-width="2"/>
  <image x="58" y="64" width="470" height="465" href="data:image/png;base64," style="image-rendering: pixelated;" filter="url(#shadow)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="548" y="104" font-size="46" font-weight="800" fill="#17111f">Entropy Loop Core</text>
    <text x="552" y="146" font-size="22" font-weight="700" fill="#5e5069">A Failure Compiler for AI agents</text>
    <text x="552" y="190" font-size="20" fill="#30273a">AI agents fail in loops.</text>
    <text x="552" y="222" font-size="20" fill="#30273a">Entropy Loop turns repeated failures into</text>
    <text x="552" y="254" font-size="20" fill="#30273a">evidence, tests, CI reports, and contracts.</text>
    <g transform="translate(552 302)">
      <rect x="0" y="0" width="92" height="40" rx="12" fill="#17111f"/>
      <text x="46" y="26" font-size="15" font-weight="800" fill="#fffaf0" text-anchor="middle">Failure</text>
      <text x="105" y="26" font-size="22" fill="#8d7d9a">→</text>
      <rect x="132" y="0" width="96" height="40" rx="12" fill="#f2c36f"/>
      <text x="180" y="26" font-size="15" font-weight="800" fill="#17111f" text-anchor="middle">Evidence</text>
      <text x="242" y="26" font-size="22" fill="#8d7d9a">→</text>
      <rect x="270" y="0" width="70" height="40" rx="12" fill="#aee8dc"/>
      <text x="305" y="26" font-size="15" font-weight="800" fill="#17111f" text-anchor="middle">Test</text>
      <text x="354" y="26" font-size="22" fill="#8d7d9a">→</text>
      <rect x="382" y="0" width="88" height="40" rx="12" fill="#ec6f91"/>
      <text x="426" y="26" font-size="15" font-weight="800" fill="#fffaf0" text-anchor="middle">CI Gate</text>
    </g>
    <text x="552" y="396" font-size="18" font-weight="800" fill="#17111f">Open-source outputs</text>
    <g transform="translate(552 420)" font-size="15" font-weight="800">
      <rect x="0" y="0" width="74" height="34" rx="10" fill="#fff3c7" stroke="#e2c46b"/>
      <text x="37" y="22" fill="#17111f" text-anchor="middle">JSON</text>
      <rect x="86" y="0" width="106" height="34" rx="10" fill="#f7b7ce" stroke="#df82a9"/>
      <text x="139" y="22" fill="#17111f" text-anchor="middle">Markdown</text>
      <rect x="204" y="0" width="98" height="34" rx="10" fill="#bcc9f4" stroke="#7d8cd0"/>
      <text x="253" y="22" fill="#17111f" text-anchor="middle">JUnit XML</text>
      <rect x="314" y="0" width="126" height="34" rx="10" fill="#b7ebe4" stroke="#75bfb5"/>
      <text x="377" y="22" fill="#17111f" text-anchor="middle">HTML Console</text>
      <rect x="0" y="46" width="118" height="34" rx="10" fill="#f4bd74" stroke="#d4963b"/>
      <text x="59" y="68" fill="#17111f" text-anchor="middle">GitHub Action</text>
      <rect x="130" y="46" width="144" height="34" rx="10" fill="#17111f"/>
      <text x="202" y="68" fill="#fffaf0" text-anchor="middle">Stable Contract</text>
    </g>
    <g transform="translate(552 536)">
      <rect x="0" y="0" width="470" height="42" rx="14" fill="#fff6df" stroke="#dfd2bf"/>
      <text x="235" y="27" font-size="16" font-weight="700" fill="#4d4359" text-anchor="middle">Local files · No telemetry · No hidden network</text>
    </g>
  </g>
</svg>
